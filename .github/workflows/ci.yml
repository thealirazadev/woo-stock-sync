name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and test (PHP 8.2)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Lint (phpcs, WordPress Coding Standards)
        run: composer run lint

      - name: PHP syntax check
        run: |
          set -eo pipefail
          find . -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      # No WordPress on this job, so the integration tests self-skip and only the pure-logic tests
      # run. The integration job below exercises the rest against real WordPress + WooCommerce;
      # keeping both proves the stub path still works for contributors without a database.
      - name: Tests (phpunit, stub mode)
        run: composer run test

  integration-tests:
    name: Integration tests (WordPress + WooCommerce)
    runs-on: ubuntu-latest

    services:
      database:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      WP_VERSION: 6.8.2
      WC_VERSION: 10.6.2
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
      WC_PLUGIN_PATH: /tmp/woocommerce/woocommerce

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install WordPress and the core test suite
        run: |
          set -euo pipefail
          curl -sSL "https://wordpress.org/wordpress-${WP_VERSION}.tar.gz" -o /tmp/wordpress.tar.gz
          mkdir -p /tmp/wordpress
          tar --strip-components=1 -xzf /tmp/wordpress.tar.gz -C /tmp/wordpress
          curl -sSL "https://github.com/WordPress/wordpress-develop/archive/refs/tags/${WP_VERSION}.tar.gz" -o /tmp/wordpress-develop.tar.gz
          tar -xzf /tmp/wordpress-develop.tar.gz -C /tmp
          mkdir -p "$WP_TESTS_DIR"
          cp -r "/tmp/wordpress-develop-${WP_VERSION}/tests/phpunit/includes" "$WP_TESTS_DIR/includes"
          cp -r "/tmp/wordpress-develop-${WP_VERSION}/tests/phpunit/data" "$WP_TESTS_DIR/data"
          cp "/tmp/wordpress-develop-${WP_VERSION}/wp-tests-config-sample.php" "$WP_TESTS_DIR/wp-tests-config.php"
          sed -i "s#dirname( __FILE__ ) . '/src/'#'/tmp/wordpress/'#; s#__DIR__ . '/src/'#'/tmp/wordpress/'#" "$WP_TESTS_DIR/wp-tests-config.php"
          sed -i "s/youremptytestdbnamehere/wordpress_test/; s/yourusernamehere/root/; s/yourpasswordhere/password/; s/localhost/127.0.0.1/" "$WP_TESTS_DIR/wp-tests-config.php"

      - name: Install WooCommerce
        run: |
          set -euo pipefail
          curl -sSL "https://downloads.wordpress.org/plugin/woocommerce.${WC_VERSION}.zip" -o /tmp/woocommerce.zip
          unzip -q /tmp/woocommerce.zip -d /tmp/woocommerce

      - name: Tests (phpunit, WordPress + WooCommerce)
        run: composer run test
